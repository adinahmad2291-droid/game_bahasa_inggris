<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Soal Bahasa Inggris Anak</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-2xl">

    <h1 class="text-3xl font-bold text-center text-pink-500 mb-6">
      🎈 Generator Soal Bahasa Inggris Anak 🎈
    </h1>

    <div class="grid gap-4">

      <div>
        <label class="font-semibold">Tema</label>
        <select id="theme" class="w-full border rounded-xl p-3 mt-1">
          <option>Hewan</option>
          <option>Warna</option>
          <option>Buah</option>
          <option>Angka</option>
          <option>Sekolah</option>
          <option>Tubuh</option>
          <option>Keluarga</option>
          <option>Cuaca</option>
          <option>Transportasi</option>
          <option>Makanan</option>
          <option>Aktivitas sehari-hari</option>
          <option>Greeting</option>
        </select>
      </div>

      <div>
        <label class="font-semibold">Jumlah Soal</label>
        <input type="number" id="amount" value="5" min="1" max="50" class="w-full border rounded-xl p-3 mt-1">
      </div>

      <div>
        <label class="font-semibold">Tingkat Kesulitan</label>
        <select id="difficulty" class="w-full border rounded-xl p-3 mt-1">
          <option>EASY</option>
          <option>MEDIUM</option>
          <option>HARD</option>
        </select>
      </div>

      <button onclick="generateQuestions()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-2xl text-lg transition-all">
        🚀 Generate Soal
      </button>

    </div>

    <div class="mt-6">
      <h2 class="text-xl font-bold mb-3">📦 Hasil JSON</h2>
      <textarea id="result" class="w-full h-96 border rounded-2xl p-4 bg-gray-100 font-mono"></textarea>
    </div>

  </div>

<script src="script.js"></script>

</body>
</html>
