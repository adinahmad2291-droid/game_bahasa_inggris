<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Prompt Game Bahasa Inggris</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-blue-100 min-h-screen p-6">

<div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl p-6">

  <h1 class="text-4xl font-bold text-center text-pink-500 mb-6">
    🎮 Generator Prompt Game Bahasa Inggris Anak
  </h1>

  <div class="grid md:grid-cols-2 gap-4">

    <div>
      <label class="font-bold">Tema Game</label>
      <select id="theme" class="w-full border rounded-xl p-3 mt-2">
        <option>Hewan</option>
        <option>Warna</option>
        <option>Buah</option>
        <option>Angka</option>
        <option>Sekolah</option>
        <option>Greeting</option>
      </select>
    </div>

    <div>
      <label class="font-bold">Jumlah Soal</label>
      <input type="number" id="amount" value="10" class="w-full border rounded-xl p-3 mt-2">
    </div>

    <div>
      <label class="font-bold">Kesulitan</label>
      <select id="difficulty" class="w-full border rounded-xl p-3 mt-2">
        <option>EASY</option>
        <option>MEDIUM</option>
        <option>HARD</option>
      </select>
    </div>

    <div>
      <label class="font-bold">Warna Tema</label>
      <input type="color" id="color" value="#ff4da6" class="w-full h-12 border rounded-xl mt-2">
    </div>

  </div>

  <button onclick="generatePrompt()" class="w-full mt-6 bg-pink-500 hover:bg-pink-600 text-white text-xl font-bold py-4 rounded-2xl">
    🚀 Generate Prompt
  </button>

  <div class="mt-8">
    <h2 class="text-2xl font-bold mb-3">📦 Hasil Prompt</h2>

    <textarea id="result" class="w-full h-[500px] border rounded-2xl p-4 bg-gray-100 font-mono"></textarea>

    <button onclick="copyPrompt()" class="mt-4 bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">
      📋 Copy Prompt
    </button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
